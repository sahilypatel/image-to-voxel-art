<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Neon Street</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a1a; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x080818);
        scene.fog = new THREE.FogExp2(0x080818, 0.012);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(35, 25, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.4;
        controls.target.set(0, 8, 0);

        const ambient = new THREE.AmbientLight(0x111133, 0.4);
        scene.add(ambient);

        const moonLight = new THREE.DirectionalLight(0x4466aa, 0.3);
        moonLight.position.set(30, 50, -20);
        scene.add(moonLight);

        const PALETTE = {
            ROAD: 0x1a1a2e,
            ROAD_LINE: 0xffee00,
            SIDEWALK: 0x2a2a3e,
            BUILDING_1: 0x1c1c3a,
            BUILDING_2: 0x222244,
            BUILDING_3: 0x181830,
            WINDOW_LIT: 0xffdd88,
            WINDOW_DARK: 0x0a0a1a,
            NEON_PINK: 0xff0066,
            NEON_CYAN: 0x00ffcc,
            NEON_PURPLE: 0xaa00ff,
            NEON_BLUE: 0x0088ff,
            NEON_YELLOW: 0xffee00,
            PUDDLE: 0x112244,
            STEAM: 0x334455,
            SIGN_BG: 0x111111,
            METAL: 0x444466,
        };

        const voxels = [];
        function addVoxel(x, y, z, color) {
            voxels.push({ x, y, z, color });
        }

        // Road
        for (let x = -25; x <= 25; x++) {
            for (let z = -4; z <= 4; z++) {
                addVoxel(x, 0, z, PALETTE.ROAD);
                if (z === 0 && x % 4 < 2) addVoxel(x, 0.01, z, PALETTE.ROAD_LINE);
            }
        }

        // Sidewalks
        for (let x = -25; x <= 25; x++) {
            for (let z = 5; z <= 8; z++) addVoxel(x, 0.5, z, PALETTE.SIDEWALK);
            for (let z = -8; z <= -5; z++) addVoxel(x, 0.5, z, PALETTE.SIDEWALK);
        }

        // Rain puddles on road
        for (let i = 0; i < 20; i++) {
            const px = Math.floor(Math.random() * 40 - 20);
            const pz = Math.floor(Math.random() * 6 - 3);
            for (let dx = 0; dx < 2; dx++)
                for (let dz = 0; dz < 2; dz++)
                    addVoxel(px + dx, 0.02, pz + dz, PALETTE.PUDDLE);
        }

        function buildBuilding(bx, bz, w, d, h, palette, side) {
            const baseColor = [PALETTE.BUILDING_1, PALETTE.BUILDING_2, PALETTE.BUILDING_3][Math.floor(Math.random() * 3)];
            for (let x = 0; x < w; x++) {
                for (let z = 0; z < d; z++) {
                    for (let y = 0; y <= h; y++) {
                        const isEdge = x === 0 || x === w - 1 || z === 0 || z === d - 1;
                        if (!isEdge && y < h) continue;
                        addVoxel(bx + x, y + 1, bz + z, baseColor);
                    }
                }
            }

            // Windows
            const facingZ = side === 'north' ? bz : bz + d - 1;
            for (let x = 1; x < w - 1; x += 2) {
                for (let y = 3; y < h; y += 3) {
                    const lit = Math.random() > 0.35;
                    addVoxel(bx + x, y + 1, facingZ, lit ? PALETTE.WINDOW_LIT : PALETTE.WINDOW_DARK);
                    addVoxel(bx + x, y + 2, facingZ, lit ? PALETTE.WINDOW_LIT : PALETTE.WINDOW_DARK);
                }
            }

            // Neon signs on some buildings
            if (Math.random() > 0.4) {
                const neonColors = [PALETTE.NEON_PINK, PALETTE.NEON_CYAN, PALETTE.NEON_PURPLE, PALETTE.NEON_BLUE];
                const neonColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                const signY = 5 + Math.floor(Math.random() * (h - 8));
                const signLen = Math.min(w - 2, 3 + Math.floor(Math.random() * 3));
                const signX = bx + Math.floor((w - signLen) / 2);
                for (let sx = 0; sx < signLen; sx++) {
                    addVoxel(signX + sx, signY, facingZ + (side === 'north' ? -1 : 1), neonColor);
                }
            }

            // Rooftop details
            for (let x = 1; x < w - 1; x += 3) {
                for (let z = 1; z < d - 1; z += 3) {
                    if (Math.random() > 0.5) {
                        const rh = 1 + Math.floor(Math.random() * 2);
                        for (let ry = 0; ry < rh; ry++)
                            addVoxel(bx + x, h + 2 + ry, bz + z, PALETTE.METAL);
                    }
                }
            }
        }

        // North side buildings
        let nx = -24;
        while (nx < 24) {
            const w = 4 + Math.floor(Math.random() * 6);
            const d = 4 + Math.floor(Math.random() * 3);
            const h = 12 + Math.floor(Math.random() * 20);
            buildBuilding(nx, 9, w, d, h, null, 'north');
            nx += w + 1;
        }

        // South side buildings
        let sx = -24;
        while (sx < 24) {
            const w = 4 + Math.floor(Math.random() * 6);
            const d = 4 + Math.floor(Math.random() * 3);
            const h = 10 + Math.floor(Math.random() * 18);
            buildBuilding(sx, -8 - d, w, d, h, null, 'south');
            sx += w + 1;
        }

        // Street lights
        for (let lx = -20; lx <= 20; lx += 8) {
            for (const lz of [5, -5]) {
                for (let ly = 1; ly <= 6; ly++) addVoxel(lx, ly, lz, PALETTE.METAL);
                addVoxel(lx, 7, lz, PALETTE.NEON_YELLOW);
                addVoxel(lx + (lz > 0 ? -1 : 1), 7, lz, PALETTE.NEON_YELLOW);
            }
        }

        // Vertical neon strips on building edges
        for (let i = 0; i < 6; i++) {
            const stripX = -20 + Math.floor(Math.random() * 40);
            const stripZ = Math.random() > 0.5 ? 9 : -9;
            const col = [PALETTE.NEON_PINK, PALETTE.NEON_CYAN, PALETTE.NEON_PURPLE][Math.floor(Math.random() * 3)];
            const h = 8 + Math.floor(Math.random() * 12);
            for (let y = 2; y < 2 + h; y++) addVoxel(stripX, y, stripZ, col);
        }

        // Build mesh
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.7, metalness: 0.2 });
        const mesh = new THREE.InstancedMesh(geometry, material, voxels.length);
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        const dummy = new THREE.Object3D();
        const color = new THREE.Color();
        voxels.forEach((v, i) => {
            dummy.position.set(v.x, v.y, v.z);
            dummy.updateMatrix();
            mesh.setMatrixAt(i, dummy.matrix);
            mesh.setColorAt(i, color.setHex(v.color));
        });
        scene.add(mesh);

        // Neon glow lights
        const neonLights = [
            { color: 0xff0066, x: -10, z: 8 },
            { color: 0x00ffcc, x: 5, z: -8 },
            { color: 0xaa00ff, x: 15, z: 8 },
            { color: 0x0088ff, x: -5, z: -8 },
            { color: 0xff0066, x: 20, z: 8 },
            { color: 0x00ffcc, x: -15, z: -8 },
        ];
        neonLights.forEach(nl => {
            const pl = new THREE.PointLight(nl.color, 2, 20);
            pl.position.set(nl.x, 6, nl.z);
            scene.add(pl);
        });

        // Rain particles
        const rainCount = 600;
        const rainGeo = new THREE.BoxGeometry(0.05, 0.6, 0.05);
        const rainMat = new THREE.MeshBasicMaterial({ color: 0x8899bb, transparent: true, opacity: 0.4 });
        const rainMesh = new THREE.InstancedMesh(rainGeo, rainMat, rainCount);
        scene.add(rainMesh);

        const rainDrops = [];
        for (let i = 0; i < rainCount; i++) {
            rainDrops.push({
                x: (Math.random() - 0.5) * 60,
                y: Math.random() * 40,
                z: (Math.random() - 0.5) * 30,
                speed: 0.5 + Math.random() * 0.5
            });
        }

        // Steam vents
        const steamCount = 60;
        const steamGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const steamMat = new THREE.MeshBasicMaterial({ color: PALETTE.STEAM, transparent: true, opacity: 0.3 });
        const steamMesh = new THREE.InstancedMesh(steamGeo, steamMat, steamCount);
        scene.add(steamMesh);

        const steamParticles = [];
        for (let i = 0; i < steamCount; i++) {
            steamParticles.push({
                x: -8 + Math.random() * 2,
                y: 1 + Math.random() * 3,
                z: 6 + Math.random(),
                speedY: 0.02 + Math.random() * 0.03,
                life: Math.random()
            });
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            controls.update();

            // Rain
            rainDrops.forEach((r, i) => {
                r.y -= r.speed;
                if (r.y < 0) {
                    r.y = 35 + Math.random() * 10;
                    r.x = (Math.random() - 0.5) * 60;
                    r.z = (Math.random() - 0.5) * 30;
                }
                dummy.position.set(r.x, r.y, r.z);
                dummy.scale.set(1, 1, 1);
                dummy.rotation.set(0, 0, 0);
                dummy.updateMatrix();
                rainMesh.setMatrixAt(i, dummy.matrix);
            });
            rainMesh.instanceMatrix.needsUpdate = true;

            // Steam
            steamParticles.forEach((s, i) => {
                s.y += s.speedY;
                s.life -= 0.005;
                s.x += Math.sin(time * 2 + i) * 0.01;
                if (s.life <= 0) {
                    s.y = 1;
                    s.life = 1;
                    s.x = -8 + Math.random() * 2;
                }
                dummy.position.set(s.x, s.y, s.z);
                dummy.scale.setScalar(s.life);
                dummy.rotation.set(0, 0, 0);
                dummy.updateMatrix();
                steamMesh.setMatrixAt(i, dummy.matrix);
            });
            steamMesh.instanceMatrix.needsUpdate = true;

            // Flicker neon lights
            neonLights.forEach((nl, i) => {
                const light = scene.children.find(c => c.isPointLight && c.position.x === nl.x);
                if (light) light.intensity = 1.5 + Math.sin(time * 8 + i * 3) * 0.5;
            });

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
