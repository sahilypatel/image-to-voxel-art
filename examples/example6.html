<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medieval Floating Castle</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #c8ddf0; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xc8ddf0);
        scene.fog = new THREE.FogExp2(0xc8ddf0, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(55, 40, 55);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.4;
        controls.target.set(0, 10, 0);

        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xfff4e0, 1.2);
        sun.position.set(40, 80, 30);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.left = -60;
        sun.shadow.camera.right = 60;
        sun.shadow.camera.top = 60;
        sun.shadow.camera.bottom = -60;
        scene.add(sun);

        const backLight = new THREE.DirectionalLight(0x8888cc, 0.3);
        backLight.position.set(-30, 20, -30);
        scene.add(backLight);

        const PALETTE = {
            STONE: 0x999988,
            STONE_LIGHT: 0xbbbbaa,
            STONE_DARK: 0x666660,
            WALL: 0xccccbb,
            ROOF: 0x553322,
            ROOF_DARK: 0x3a2215,
            FLAG_RED: 0xcc2222,
            FLAG_BLUE: 0x2244aa,
            WOOD: 0x664422,
            WOOD_DARK: 0x442211,
            GRASS: 0x5a8a3a,
            GRASS_LIGHT: 0x6a9e4a,
            DIRT: 0x5c4033,
            WATER: 0x4488bb,
            ROCK: 0x777766,
            ROCK_DARK: 0x555550,
            GOLD: 0xffcc00,
            TORCH: 0xff8833,
        };

        const voxels = [];
        function addVoxel(x, y, z, color) {
            voxels.push({ x, y, z, color });
        }

        // Floating island base
        const ISLAND_R = 20;
        for (let x = -ISLAND_R; x <= ISLAND_R; x++) {
            for (let z = -ISLAND_R; z <= ISLAND_R; z++) {
                const d = Math.sqrt(x * x + z * z);
                if (d > ISLAND_R) continue;
                const surfaceY = Math.floor(Math.sin(x * 0.1) * Math.cos(z * 0.1) * 1.5);
                const depth = Math.floor((ISLAND_R - d) * 0.8 + Math.sin(x * 0.3 + z * 0.2) * 2);
                for (let y = surfaceY; y >= surfaceY - depth; y--) {
                    let col;
                    if (y === surfaceY) col = Math.random() > 0.6 ? PALETTE.GRASS : PALETTE.GRASS_LIGHT;
                    else if (y > surfaceY - 2) col = PALETTE.DIRT;
                    else col = Math.random() > 0.5 ? PALETTE.ROCK : PALETTE.ROCK_DARK;
                    addVoxel(x, y, z, col);
                }
            }
        }

        // Castle wall builder
        function buildWall(x1, z1, x2, z2, height, wallColor) {
            const dx = Math.sign(x2 - x1);
            const dz = Math.sign(z2 - z1);
            const steps = Math.max(Math.abs(x2 - x1), Math.abs(z2 - z1));
            for (let s = 0; s <= steps; s++) {
                const wx = x1 + s * dx;
                const wz = z1 + s * dz;
                for (let y = 1; y <= height; y++) {
                    addVoxel(wx, y, wz, wallColor || PALETTE.WALL);
                }
                // Battlements (merlons)
                if (s % 2 === 0) {
                    addVoxel(wx, height + 1, wz, PALETTE.STONE);
                }
            }
        }

        // Tower builder
        function buildTower(tx, tz, r, height, roofColor) {
            for (let y = 1; y <= height; y++) {
                for (let x = -r; x <= r; x++) {
                    for (let z = -r; z <= r; z++) {
                        if (x * x + z * z <= r * r + 0.5) {
                            const isEdge = x * x + z * z > (r - 1) * (r - 1);
                            if (isEdge || y === 1 || y === height) {
                                addVoxel(tx + x, y, tz + z, PALETTE.STONE_LIGHT);
                            }
                        }
                    }
                }
            }

            // Windows
            for (let y = 4; y < height; y += 4) {
                addVoxel(tx + r, y, tz, PALETTE.STONE_DARK);
                addVoxel(tx - r, y, tz, PALETTE.STONE_DARK);
                addVoxel(tx, y, tz + r, PALETTE.STONE_DARK);
                addVoxel(tx, y, tz - r, PALETTE.STONE_DARK);
            }

            // Conical roof
            const rc = roofColor || PALETTE.ROOF;
            for (let ry = 0; ry <= r + 2; ry++) {
                const rr = r + 1 - ry * 0.8;
                if (rr < 0) break;
                for (let x = -Math.ceil(rr); x <= Math.ceil(rr); x++) {
                    for (let z = -Math.ceil(rr); z <= Math.ceil(rr); z++) {
                        if (x * x + z * z <= rr * rr + 1) {
                            addVoxel(tx + x, height + 1 + ry, tz + z, rc);
                        }
                    }
                }
            }

            // Flag on top
            const flagY = height + r + 4;
            addVoxel(tx, flagY - 1, tz, PALETTE.WOOD);
            addVoxel(tx, flagY, tz, PALETTE.WOOD);
            addVoxel(tx, flagY + 1, tz, PALETTE.WOOD);
            addVoxel(tx + 1, flagY + 1, tz, Math.random() > 0.5 ? PALETTE.FLAG_RED : PALETTE.FLAG_BLUE);
            addVoxel(tx + 1, flagY, tz, Math.random() > 0.5 ? PALETTE.FLAG_RED : PALETTE.FLAG_BLUE);
        }

        // Outer walls
        const W = 14;
        buildWall(-W, -W, W, -W, 8); // South
        buildWall(-W, W, W, W, 8);   // North
        buildWall(-W, -W, -W, W, 8); // West
        buildWall(W, -W, W, W, 8);   // East

        // Corner towers
        buildTower(-W, -W, 3, 16, PALETTE.ROOF);
        buildTower(W, -W, 3, 16, PALETTE.ROOF);
        buildTower(-W, W, 3, 16, PALETTE.ROOF);
        buildTower(W, W, 3, 16, PALETTE.ROOF);

        // Main keep (center)
        const K = 5;
        for (let x = -K; x <= K; x++) {
            for (let z = -K; z <= K; z++) {
                for (let y = 1; y <= 14; y++) {
                    const isEdge = Math.abs(x) >= K || Math.abs(z) >= K;
                    if (isEdge || y <= 2 || y >= 13) {
                        addVoxel(x, y, z, PALETTE.WALL);
                    }
                }
                // Battlements
                if ((Math.abs(x) === K || Math.abs(z) === K) && (x + z) % 2 === 0) {
                    addVoxel(x, 15, z, PALETTE.STONE);
                }
            }
        }

        // Keep roof
        for (let ry = 0; ry < 6; ry++) {
            const rr = K + 1 - ry;
            if (rr < 0) break;
            for (let x = -rr; x <= rr; x++) {
                for (let z = -rr; z <= rr; z++) {
                    addVoxel(x, 15 + ry, z, ry === 0 ? PALETTE.ROOF_DARK : PALETTE.ROOF);
                }
            }
        }

        // Keep windows
        for (let y = 5; y < 14; y += 4) {
            addVoxel(K, y, 0, PALETTE.STONE_DARK);
            addVoxel(-K, y, 0, PALETTE.STONE_DARK);
            addVoxel(0, y, K, PALETTE.STONE_DARK);
            addVoxel(0, y, -K, PALETTE.STONE_DARK);
        }

        // Gate
        for (let y = 1; y <= 5; y++) {
            addVoxel(-1, y, -W, PALETTE.WOOD_DARK);
            addVoxel(0, y, -W, y <= 4 ? PALETTE.WOOD : PALETTE.STONE);
            addVoxel(1, y, -W, PALETTE.WOOD_DARK);
        }

        // Gatehouse towers
        buildTower(-3, -W, 2, 12, PALETTE.ROOF_DARK);
        buildTower(3, -W, 2, 12, PALETTE.ROOF_DARK);

        // Courtyard: well
        for (let a = 0; a < 8; a++) {
            const wx = Math.round(Math.cos(a * Math.PI / 4) * 2) + 7;
            const wz = Math.round(Math.sin(a * Math.PI / 4) * 2) + 7;
            addVoxel(wx, 1, wz, PALETTE.STONE);
            addVoxel(wx, 2, wz, PALETTE.STONE);
        }
        addVoxel(7, 1, 7, PALETTE.WATER);

        // Torches on walls
        const torchPositions = [
            [-W + 1, 6, -W], [W - 1, 6, -W], [-W, 6, -W + 5], [W, 6, -W + 5],
            [-W, 6, W - 5], [W, 6, W - 5], [-W + 1, 6, W], [W - 1, 6, W]
        ];
        torchPositions.forEach(([tx, ty, tz]) => {
            addVoxel(tx, ty, tz, PALETTE.WOOD);
            addVoxel(tx, ty + 1, tz, PALETTE.TORCH);
        });

        // Drawbridge path
        for (let z = -W - 5; z < -W; z++) {
            addVoxel(-1, 0, z, PALETTE.WOOD);
            addVoxel(0, 0, z, PALETTE.WOOD);
            addVoxel(1, 0, z, PALETTE.WOOD);
        }

        // Build mesh
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.75, metalness: 0.05 });
        const mainMesh = new THREE.InstancedMesh(geometry, material, voxels.length);
        mainMesh.castShadow = true;
        mainMesh.receiveShadow = true;

        const dummy = new THREE.Object3D();
        const color = new THREE.Color();
        voxels.forEach((v, i) => {
            dummy.position.set(v.x, v.y, v.z);
            dummy.updateMatrix();
            mainMesh.setMatrixAt(i, dummy.matrix);
            mainMesh.setColorAt(i, color.setHex(v.color));
        });
        scene.add(mainMesh);

        // Torch lights
        torchPositions.forEach(([tx, ty, tz]) => {
            const tl = new THREE.PointLight(0xff6622, 0.8, 10);
            tl.position.set(tx, ty + 2, tz);
            scene.add(tl);
        });

        // Cloud particles
        const cloudCount = 80;
        const cloudGeo = new THREE.BoxGeometry(2, 1, 2);
        const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
        const cloudMesh = new THREE.InstancedMesh(cloudGeo, cloudMat, cloudCount);
        scene.add(cloudMesh);

        const clouds = [];
        for (let i = 0; i < cloudCount; i++) {
            clouds.push({
                x: (Math.random() - 0.5) * 80,
                y: -10 - Math.random() * 20,
                z: (Math.random() - 0.5) * 80,
                speed: 0.01 + Math.random() * 0.02,
                scale: 1 + Math.random() * 2
            });
        }

        // Birds
        const birdCount = 12;
        const birdGeo = new THREE.BoxGeometry(0.3, 0.1, 0.8);
        const birdMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
        const birdMesh = new THREE.InstancedMesh(birdGeo, birdMat, birdCount);
        scene.add(birdMesh);

        const birds = [];
        for (let i = 0; i < birdCount; i++) {
            birds.push({
                cx: (Math.random() - 0.5) * 30,
                cy: 25 + Math.random() * 15,
                cz: (Math.random() - 0.5) * 30,
                radius: 5 + Math.random() * 10,
                speed: 0.3 + Math.random() * 0.3,
                phase: Math.random() * Math.PI * 2
            });
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            controls.update();

            // Float the castle
            mainMesh.position.y = Math.sin(time * 0.3) * 0.8;

            // Clouds drifting below
            clouds.forEach((c, i) => {
                c.x += c.speed;
                if (c.x > 45) c.x = -45;
                dummy.position.set(c.x, c.y + Math.sin(time * 0.2 + i) * 0.5, c.z);
                dummy.scale.set(c.scale, 1, c.scale);
                dummy.rotation.set(0, 0, 0);
                dummy.updateMatrix();
                cloudMesh.setMatrixAt(i, dummy.matrix);
            });
            cloudMesh.instanceMatrix.needsUpdate = true;

            // Birds circling
            birds.forEach((b, i) => {
                const angle = time * b.speed + b.phase;
                dummy.position.set(
                    b.cx + Math.cos(angle) * b.radius,
                    b.cy + Math.sin(time * 0.5 + b.phase) * 2,
                    b.cz + Math.sin(angle) * b.radius
                );
                dummy.rotation.set(0, -angle + Math.PI / 2, Math.sin(time * 3 + b.phase) * 0.3);
                dummy.scale.set(1, 1, 1);
                dummy.updateMatrix();
                birdMesh.setMatrixAt(i, dummy.matrix);
            });
            birdMesh.instanceMatrix.needsUpdate = true;

            // Flicker torches
            scene.children.forEach(c => {
                if (c.isPointLight && c.color.r > 0.8) {
                    c.intensity = 0.6 + Math.random() * 0.4;
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
